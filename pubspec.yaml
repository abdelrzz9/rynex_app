name: rynex_app
description: "A professional offline-first Excalidraw-like drawing application."

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1
  go_router: ^14.8.1
  uuid: ^4.5.1
  equatable: ^2.0.7
  collection: ^1.19.1
  json_annotation: ^4.9.0
  path_provider: ^2.1.4
  file_picker: ^8.1.7
  share_plus: ^10.1.4
  flutter_svg: ^2.0.17
  vector_math: ^2.1.4
  isar: ^3.1.0+1
  isar_flutter_libs: ^3.1.0+1
  pdf: ^3.11.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.4.14
  json_serializable: ^6.9.4
  mocktail: ^1.0.4
  flutter_launcher_icons: ^0.14.3

flutter:
  uses-material-design: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/app_icon.jpeg"
  adaptive_icon_background: "#ffffff"
  adaptive_icon_foreground: "assets/app_icon.jpeg"
